<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mihon Extension Health</title>
        <style>
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #ffffff;
                --text-muted: #a0a0a0;
                --accent: #00e676;
                --up: #4caf50;
                --down: #f44336;
                --cloudflare: #00bcd4;
                --error: #ff9800;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .header {
                text-align: center;
                margin-bottom: 20px;
            }
            .search-bar {
                width: 100%;
                max-width: 600px;
                padding: 12px 20px;
                margin-bottom: 15px; /* Reduced to make room for filters */
                border-radius: 25px;
                border: none;
                background-color: var(--card-bg);
                color: var(--text-main);
                font-size: 16px;
                outline: none;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }

            /* --- NEW FILTER BUTTON STYLES --- */
            .filter-container {
                display: flex;
                gap: 10px;
                margin-bottom: 30px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .filter-btn {
                background-color: var(--card-bg);
                color: var(--text-muted);
                border: 2px solid transparent;
                padding: 8px 16px;
                border-radius: 20px;
                cursor: pointer;
                font-weight: bold;
                font-size: 14px;
                transition: all 0.2s ease;
            }
            .filter-btn:hover {
                opacity: 0.8;
            }
            /* Active states match your exact badge colors */
            .filter-btn.active[data-filter="ALL"] { background-color: var(--text-main); color: var(--bg-color); }
            .filter-btn.active[data-filter="UP"] { background-color: rgba(76, 175, 80, 0.2); color: var(--up); border-color: var(--up); }
